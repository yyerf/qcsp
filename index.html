<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=./warroom/">
    <meta name="robots" content="noindex, nofollow">
    <title>QCSP CTF War Room</title>
    <link rel="canonical" href="./warroom/">
    <style>
      :root {
        color-scheme: dark;
        --bg: #10100d;
        --text: #f4f0df;
        --muted: #b9b093;
        --line: #383424;
        --green: #8bd867;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        background: var(--bg);
        font-family: "Aptos", "Segoe UI", "Helvetica Neue", sans-serif;
      }

      main {
        width: min(520px, 100%);
        border: 1px solid var(--line);
        padding: 24px;
        background: #181812;
      }

      h1 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        line-height: 1;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
      }

      a {
        color: var(--green);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QCSP CTF War Room</h1>
      <p>Redirecting to the dashboard.</p>
      <a href="./warroom/">Open War Room</a>
    </main>
    <script>
      window.location.replace("./warroom/");
    </script>
  </body>
</html>
